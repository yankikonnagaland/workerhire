<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHire</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --white: #ffffff;
  --off: #f7f6f4;
  --off2: #f0ede8;
  --border: #e8e4de;
  --border2: #d4cfc8;
  --ink: #1a1814;
  --ink2: #6b6560;
  --ink3: #9e9890;
  --amber: #c8831a;
  --amber-bg: #fdf3e3;
  --amber-border: #f0d49a;
  --green: #2a7a4b;
  --green-bg: #eaf4ee;
  --green-border: #a8d9b8;
  --red: #c0392b;
  --red-bg: #fdf0ee;
  --red-border: #f0b8b2;
  --blue: #1a5ca8;
  --blue-bg: #eaf1fb;
  --r: 10px;
  --r-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 15px; }
body {
  background: var(--off);
  color: var(--ink);
  font-family: 'Geist', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 60px;
  background: rgba(247,246,244,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.45rem; letter-spacing: -.3px; color: var(--ink);
  display: flex; align-items: center; gap: 7px;
}
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.nav-center { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 16px; border-radius: var(--r-sm);
  font-size: .82rem; font-weight: 500;
  border: none; background: transparent; color: var(--ink2); cursor: pointer;
  transition: all .18s;
}
.nav-tab:hover { background: var(--border); color: var(--ink); }
.nav-tab.active { background: var(--ink); color: var(--white); }
.cart-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-radius: 20px;
  background: var(--white); border: 1px solid var(--border);
  font-size: .82rem; font-weight: 500; color: var(--ink);
  cursor: pointer; transition: border-color .18s;
}
.cart-pill:hover { border-color: var(--ink); }
.cart-n {
  min-width: 18px; height: 18px; border-radius: 9px;
  background: var(--ink); color: var(--white);
  font-size: .65rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; padding: 0 5px;
}

/* PAGES */
.page { display: none; }
.page.active { display: block; animation: up .22s ease; }
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* HERO */
.hero {
  padding: 72px 40px 52px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
}
.hero-inner { max-width: 540px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  background: var(--amber-bg); border: 1px solid var(--amber-border);
  font-size: .7rem; font-weight: 600; color: var(--amber);
  letter-spacing: .6px; text-transform: uppercase; margin-bottom: 22px;
}
.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  font-weight: 400; line-height: 1.13;
  color: var(--ink); margin-bottom: 16px; letter-spacing: -.4px;
}
.hero h1 em { font-style: italic; color: var(--amber); }
.hero p { color: var(--ink2); font-size: .93rem; line-height: 1.75; max-width: 400px; }

/* FILTER */
.filter-wrap {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 14px 40px; position: sticky; top: 60px; z-index: 100;
}
.filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-input, .filter-select {
  height: 36px; padding: 0 12px; border-radius: var(--r-sm);
  background: var(--off); border: 1px solid var(--border);
  color: var(--ink); font-family: 'Geist', sans-serif; font-size: .82rem;
  outline: none; transition: border-color .15s;
}
.filter-input { min-width: 190px; }
.filter-select { min-width: 140px; }
.filter-input:focus, .filter-select:focus { border-color: var(--ink); background: var(--white); }
.filter-select option { background: var(--white); }
.filter-btn {
  height: 36px; padding: 0 18px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .82rem; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.filter-btn:hover { opacity: .78; }
.fsep { width: 1px; height: 18px; background: var(--border); }

/* SECTION */
.section { padding: 28px 40px; }
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 18px;
}
.section-title { font-size: .72rem; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--ink3); }
.results-count { font-size: .78rem; color: var(--ink3); }

.workers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(296px, 1fr));
  gap: 12px;
}

/* WORKER CARD */
.wcard {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  transition: box-shadow .18s, border-color .18s;
  position: relative;
}
.wcard:hover { border-color: var(--border2); box-shadow: 0 4px 18px rgba(0,0,0,.06); }
.wcard-top { padding: 18px 18px 14px; display: flex; gap: 13px; }
.wcard-avatar {
  width: 42px; height: 42px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem; flex-shrink: 0;
}
.wcard-meta { flex: 1; min-width: 0; }
.wcard-name { font-size: .93rem; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.wcard-skill {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: .67rem; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
  background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border);
  margin-bottom: 5px;
}
.wcard-loc { font-size: .77rem; color: var(--ink3); }
.avail-dot {
  position: absolute; top: 16px; right: 16px;
  padding: 3px 9px; border-radius: 20px; font-size: .67rem; font-weight: 600;
}
.avail-dot.on  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.avail-dot.off { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }
.wcard-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--border);
}
.wstat { padding: 10px 12px; text-align: center; border-right: 1px solid var(--border); }
.wstat:last-child { border-right: none; }
.wstat-val { font-size: .88rem; font-weight: 600; color: var(--ink); }
.wstat-key { font-size: .63rem; color: var(--ink3); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
.wcard-foot {
  padding: 11px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.btn-add {
  flex: 1; height: 33px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .79rem; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-add:hover { opacity: .78; }
.btn-add:disabled { background: var(--off2); color: var(--ink3); cursor: default; opacity: 1; }
.btn-ghost {
  height: 33px; padding: 0 13px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--ink2); font-family: 'Geist', sans-serif;
  font-size: .79rem; cursor: pointer; transition: all .15s;
}
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

/* CART */
.cart-head { padding: 32px 40px 0; border-bottom: 0; }
.cart-head h2 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; font-weight: 400; }
.cart-head p { color: var(--ink3); font-size: .84rem; margin-top: 4px; }
.cart-layout {
  display: grid; grid-template-columns: 1fr 340px; gap: 20px;
  padding: 24px 40px; align-items: start;
}
@media(max-width:860px) { .cart-layout { grid-template-columns: 1fr; } }
.cart-items { display: flex; flex-direction: column; gap: 10px; }
.cart-item {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 15px;
  display: flex; align-items: center; gap: 13px;
}
.ci-avatar {
  width: 38px; height: 38px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
}
.ci-info { flex: 1; }
.ci-name { font-size: .88rem; font-weight: 600; }
.ci-sub  { font-size: .75rem; color: var(--ink3); margin-top: 2px; }
.ci-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.days-label { font-size: .73rem; color: var(--ink3); }
.days-input {
  width: 52px; height: 30px; text-align: center; border-radius: var(--r-sm);
  background: var(--off); border: 1px solid var(--border);
  font-family: 'Geist', sans-serif; font-size: .83rem; color: var(--ink); outline: none;
}
.ci-price { font-size: .88rem; font-weight: 600; min-width: 58px; text-align: right; }
.btn-rm {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--off2); border: none; color: var(--ink3);
  cursor: pointer; font-size: .75rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.btn-rm:hover { background: var(--red-bg); color: var(--red); }
.order-box {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px; position: sticky; top: 116px;
}
.order-box-title { font-size: .7rem; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--ink3); margin-bottom: 14px; }
.sum-row { display: flex; justify-content: space-between; font-size: .84rem; margin-bottom: 8px; color: var(--ink2); }
.sum-row.total {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  font-weight: 600; font-size: .93rem; color: var(--ink);
}
.form-sep { height: 1px; background: var(--border); margin: 18px 0; }
.flabel { font-size: .7rem; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--ink3); display: block; margin-bottom: 5px; }
.finput {
  width: 100%; height: 34px; padding: 0 11px; border-radius: var(--r-sm);
  background: var(--off); border: 1px solid var(--border);
  font-family: 'Geist', sans-serif; font-size: .83rem; color: var(--ink);
  outline: none; margin-bottom: 11px; transition: border-color .15s;
}
.finput:focus { border-color: var(--ink); background: var(--white); }
.btn-order {
  width: 100%; height: 40px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .86rem; font-weight: 500;
  cursor: pointer; margin-top: 4px; transition: opacity .15s;
}
.btn-order:hover { opacity: .78; }

/* EMPTY / SUCCESS */
.empty { text-align: center; padding: 80px 40px; }
.empty-icon { font-size: 2.2rem; margin-bottom: 16px; }
.empty h3 { font-family: 'Instrument Serif', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 8px; }
.empty p { color: var(--ink3); font-size: .86rem; }
.btn-sm {
  display: inline-block; margin-top: 18px; padding: 8px 20px; border-radius: var(--r-sm);
  background: var(--ink); color: var(--white); font-size: .82rem; font-weight: 500;
  border: none; cursor: pointer; transition: opacity .15s;
}
.btn-sm:hover { opacity: .78; }
.success-screen { text-align: center; padding: 96px 40px; }
.success-screen .tick { font-size: 2.8rem; margin-bottom: 22px; }
.success-screen h2 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 12px; }
.success-screen p { color: var(--ink2); max-width: 380px; margin: 0 auto 8px; line-height: 1.7; font-size: .88rem; }

/* ADMIN */
.admin-wrap { display: grid; grid-template-columns: 210px 1fr; min-height: calc(100vh - 60px); }
.admin-side {
  background: var(--white); border-right: 1px solid var(--border);
  padding: 24px 14px;
}
.side-label { font-size: .67rem; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--ink3); padding: 0 10px; margin-bottom: 8px; }
.side-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer;
  font-size: .84rem; color: var(--ink2); transition: all .15s; margin-bottom: 2px;
}
.side-item:hover { background: var(--off); color: var(--ink); }
.side-item.active { background: var(--ink); color: var(--white); }
.admin-main { padding: 32px 36px; }
.admin-main h2 { font-family: 'Instrument Serif', serif; font-size: 1.65rem; font-weight: 400; margin-bottom: 4px; }
.admin-subtitle { font-size: .82rem; color: var(--ink3); margin-bottom: 24px; }

.stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
@media(max-width:900px) { .stat-row { grid-template-columns: repeat(2,1fr); } }
.scard {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
}
.scard-val { font-size: 1.7rem; font-weight: 600; color: var(--ink); line-height: 1; }
.scard-key { font-size: .7rem; color: var(--ink3); margin-top: 6px; }

.table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.table-head-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.table-head-row h3 { font-size: .86rem; font-weight: 600; }
.btn-add-w {
  height: 30px; padding: 0 14px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .76rem; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-add-w:hover { opacity: .78; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 9px 14px; text-align: left;
  font-size: .67rem; font-weight: 600; letter-spacing: .7px; text-transform: uppercase;
  color: var(--ink3); background: var(--off); border-bottom: 1px solid var(--border);
}
td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: .83rem; color: var(--ink2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--off); }
.td-name { font-weight: 500; color: var(--ink); }
.stag {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .67rem; font-weight: 600;
  background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border);
}
.lvl { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .67rem; font-weight: 600; }
.lvl-e { background: var(--green-bg); color: var(--green); }
.lvl-s { background: var(--blue-bg);  color: var(--blue); }
.lvl-j { background: var(--amber-bg); color: var(--amber); }
.act { display: flex; gap: 5px; }
.btn-e, .btn-d {
  height: 25px; padding: 0 11px; border-radius: 4px; font-size: .71rem; font-weight: 500;
  cursor: pointer; border: 1px solid; transition: all .15s; font-family: 'Geist', sans-serif;
}
.btn-e { background: transparent; border-color: var(--border); color: var(--ink3); }
.btn-e:hover { border-color: var(--ink); color: var(--ink); }
.btn-d { background: transparent; border-color: var(--red-border); color: var(--red); }
.btn-d:hover { background: var(--red-bg); }

.orders-stack { display: flex; flex-direction: column; gap: 11px; }
.ocard { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; }
.ocard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.oid { font-size: .88rem; font-weight: 600; color: var(--ink); }
.odate { font-size: .73rem; color: var(--ink3); margin-top: 2px; }
.ostatus { padding: 3px 10px; border-radius: 20px; font-size: .68rem; font-weight: 600; }
.os-new      { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.os-processing { background: var(--blue-bg);  color: var(--blue);  border: 1px solid #bcd4f0; }
.os-dispatched { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.ocust { font-size: .82rem; color: var(--ink2); margin-bottom: 10px; line-height: 1.65; }
.otags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.btn-dispatch {
  height: 28px; padding: 0 13px; border-radius: var(--r-sm);
  background: var(--green-bg); border: 1px solid var(--green-border);
  color: var(--green); font-family: 'Geist', sans-serif; font-size: .76rem; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.btn-dispatch:hover { background: #d4eddb; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(26,24,20,.3); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 24px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 14px; padding: 26px; width: 100%; max-width: 460px;
  max-height: 90vh; overflow-y: auto; animation: up .2s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,.1);
}
.modal h3 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 16px; }
.modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn-cancel {
  height: 34px; padding: 0 16px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--ink2); font-family: 'Geist', sans-serif; font-size: .82rem; cursor: pointer;
}
.btn-save {
  height: 34px; padding: 0 20px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .82rem; font-weight: 500; cursor: pointer;
}

/* ADD/EDIT FORM */
.form-page { max-width: 800px; }
.form-back {
  display: inline-flex; align-items: center; gap: 5px; margin-bottom: 18px;
  font-size: .8rem; color: var(--ink3); cursor: pointer; border: none; background: none; padding: 0;
  transition: color .15s;
}
.form-back:hover { color: var(--ink); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:680px) { .form-grid { grid-template-columns: 1fr; } }
.fcard { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 14px; }
.fcard-head {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  font-size: .68rem; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--ink3);
}
.fcard-body { padding: 16px; display: flex; flex-direction: column; gap: 13px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: .7rem; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--ink3); }
.fg .req { color: var(--red); }
.fi {
  height: 34px; padding: 0 11px; border-radius: var(--r-sm);
  background: var(--off); border: 1px solid var(--border);
  font-family: 'Geist', sans-serif; font-size: .84rem; color: var(--ink);
  outline: none; transition: border-color .15s; width: 100%;
}
.fi:focus { border-color: var(--ink); background: var(--white); }
textarea.fi { height: auto; padding: 9px 11px; resize: vertical; min-height: 72px; }

.skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.skill-opt {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 11px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border); background: var(--off);
  cursor: pointer; transition: all .15s; font-size: .8rem; font-weight: 500; color: var(--ink2);
}
.skill-opt:hover { border-color: var(--border2); color: var(--ink); }
.skill-opt.sel { border-color: var(--ink); background: var(--ink); color: var(--white); }

.level-row { display: flex; gap: 7px; }
.level-opt {
  flex: 1; padding: 9px 6px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border); background: var(--off);
  cursor: pointer; text-align: center; transition: all .15s;
}
.level-opt:hover { border-color: var(--border2); }
.level-opt.sel { border-color: var(--ink); background: var(--ink); }
.lo-icon { font-size: .85rem; margin-bottom: 3px; }
.lo-label { font-size: .76rem; font-weight: 600; color: var(--ink2); }
.level-opt.sel .lo-label { color: var(--white); }

.avail-row { display: flex; gap: 7px; }
.avail-opt {
  flex: 1; padding: 11px 8px; border-radius: var(--r-sm);
  border: 1.5px solid var(--border); background: var(--off);
  cursor: pointer; text-align: center; transition: all .15s;
}
.avail-opt .ao-icon { font-size: 1rem; margin-bottom: 4px; }
.avail-opt .ao-label { font-size: .78rem; font-weight: 600; color: var(--ink3); }
.avail-opt.avail-yes.sel { border-color: var(--green); background: var(--green-bg); }
.avail-opt.avail-yes.sel .ao-label { color: var(--green); }
.avail-opt.avail-no.sel  { border-color: var(--red);   background: var(--red-bg);   }
.avail-opt.avail-no.sel  .ao-label { color: var(--red); }

.rate-wrap { position: relative; }
.rate-pre { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: .83rem; color: var(--ink3); pointer-events: none; }
.rate-wrap .fi { padding-left: 24px; }

.form-actions { display: flex; gap: 9px; }
.btn-form-cancel {
  height: 38px; padding: 0 20px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--ink2); font-family: 'Geist', sans-serif; font-size: .83rem; cursor: pointer;
}
.btn-form-save {
  flex: 1; height: 38px; border-radius: var(--r-sm);
  background: var(--ink); border: none; color: var(--white);
  font-family: 'Geist', sans-serif; font-size: .86rem; font-weight: 500; cursor: pointer;
  transition: opacity .15s;
}
.btn-form-save:hover { opacity: .78; }

/* TOAST */
.toast {
  position: fixed; bottom: 22px; right: 22px; z-index: 999;
  padding: 10px 16px; border-radius: var(--r-sm);
  background: var(--ink); color: var(--white);
  font-size: .81rem;
  transform: translateY(60px); opacity: 0; transition: all .22s;
  box-shadow: 0 4px 18px rgba(0,0,0,.14);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.err { background: var(--red); }

.stars { color: var(--amber); }
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div>WorkHire</div>
  <div class="nav-center">
    <button class="nav-tab active" onclick="showPage('home')">Find Workers</button>
    <button class="nav-tab" onclick="showPage('admin')">Admin</button>
  </div>
  <button class="cart-pill" onclick="showPage('cart')">
    Cart <span class="cart-n" id="cartCount">0</span>
  </button>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-tag">⚡ On-demand skilled workers</div>
      <h1>Find the <em>right expert</em><br>for any job</h1>
      <p>Vetted electricians, plumbers, masons and more — available in your city, ready when you are.</p>
    </div>
  </div>
  <div class="filter-wrap">
    <div class="filter-row">
      <input type="text" class="filter-input" id="filterLocation" placeholder="📍 City or area" oninput="applyFilters()">
      <div class="fsep"></div>
      <select class="filter-select" id="filterSkill" onchange="applyFilters()">
        <option value="">All skills</option>
        <option>Electrician</option><option>Plumber</option><option>Tile Mason</option>
        <option>Brick Mason</option><option>Cement Mason</option>
        <option>Carpenter</option><option>Painter</option><option>Welder</option>
      </select>
      <select class="filter-select" id="filterAvail" onchange="applyFilters()">
        <option value="">Any availability</option>
        <option value="Available">Available now</option>
        <option value="Busy">Busy</option>
      </select>
      <select class="filter-select" id="filterLevel" onchange="applyFilters()">
        <option value="">All levels</option>
        <option>Expert</option><option>Senior</option><option>Junior</option>
      </select>
      <button class="filter-btn" onclick="applyFilters()">Search</button>
    </div>
  </div>
  <div class="section">
    <div class="section-head">
      <span class="section-title">Workers</span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="workers-grid" id="workersGrid"></div>
  </div>
</div>

<!-- CART -->
<div id="page-cart" class="page">
  <div id="cartContent"></div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <div class="admin-wrap">
    <aside class="admin-side">
      <div class="side-label">Management</div>
      <div class="side-item active" onclick="adminTab('workers',this)"><span>👷</span> Workers</div>
      <div class="side-item" onclick="adminTab('orders',this)"><span>📦</span> Orders</div>
      <div class="side-item" onclick="adminTab('stats',this)"><span>📊</span> Overview</div>
    </aside>
    <div class="admin-main" id="adminMain"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlayOutside(event)">
  <div class="modal" id="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SKILLS = {
  'Electrician':'⚡','Plumber':'🔧','Tile Mason':'🪟',
  'Brick Mason':'🧱','Cement Mason':'🏗️','Carpenter':'🪚','Painter':'🎨','Welder':'🔥'
};
const SKILL_BG = {
  'Electrician':'#fffbeb','Plumber':'#eff6ff','Tile Mason':'#f0fdf4',
  'Brick Mason':'#fff1f2','Cement Mason':'#f8fafc','Carpenter':'#fff7ed',
  'Painter':'#faf5ff','Welder':'#fefce8'
};
const em = s => SKILLS[s]||'🔨';
const stars = r => '★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r));
const lvlC = l => l==='Expert'?'lvl-e':l==='Senior'?'lvl-s':'lvl-j';

let workers = [
  {id:1,name:'Abemo Kinghen',skill:'Electrician',level:'Expert',exp:12,rating:4.8,location:'Wokha',contact:'9876543210',available:true,rate:700,about:'Certified wireman with 12 years of residential & commercial experience.'},
  {id:2,name:'Sanen Imchen',skill:'Plumber',level:'Senior',exp:7,rating:4.6,location:'Mokokchung',contact:'9812345678',available:true,rate:600,about:'Specialises in pipe fitting, leak repair and bathroom installations.'},
  {id:3,name:'Theja Kire',skill:'Tile Mason',level:'Expert',exp:9,rating:4.9,location:'Chumoukedima',contact:'9834567890',available:false,rate:650,about:'Expert in floor and wall tiling with premium finishes.'},
  {id:4,name:'Aremo Yanthan',skill:'Brick Mason',level:'Senior',exp:15,rating:4.7,location:'Kohima',contact:'9801234567',available:true,rate:550,about:'Experienced in structural brickwork and boundary walls.'},
  {id:5,name:'Hongba Chang',skill:'Cement Mason',level:'Junior',exp:3,rating:4.1,location:'Tuensang',contact:'9867890123',available:true,rate:450,about:'Concrete finishing and plastering specialist.'},
  {id:6,name:'Yanger Long',skill:'Carpenter',level:'Expert',exp:18,rating:5.0,location:'Dimapur',contact:'9845678901',available:true,rate:750,about:'Custom furniture, door frames and wooden fixtures.'},
  {id:7,name:'Rovi Metha',skill:'Electrician',level:'Senior',exp:6,rating:4.4,location:'Kohima',contact:'9823456789',available:false,rate:650,about:'Wiring, switchboard installation and solar panel setup.'},
  {id:8,name:'Kevin Konyak',skill:'Painter',level:'Junior',exp:2,rating:3.9,location:'Mon',contact:'9889012345',available:true,rate:400,about:'Interior and exterior painting with texture finishes.'},
  {id:9,name:'Ameto Achumi',skill:'Welder',level:'Expert',exp:10,rating:4.7,location:'Zunheboto',contact:'9856789012',available:true,rate:800,about:'Arc welding, gate fabrication and steel structure work.'},
  {id:10,name:'Bito Chishi',skill:'Plumber',level:'Expert',exp:11,rating:4.5,location:'Niuland',contact:'9878901234',available:true,rate:680,about:'Overhead tank installation, drainage and sanitary fittings.'},
];
let orders=[],cart=[],nextWId=11,nextOId=1001;

function addToCart(id){
  if(cart.find(c=>c.id===id)){toast('Already in cart','err');return;}
  const w=workers.find(w=>w.id===id);if(!w)return;
  cart.push({...w,days:1});updCartCount();toast(w.name+' added to cart');renderGrid();
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updCartCount();renderCart();}
function updCartCount(){document.getElementById('cartCount').textContent=cart.length;}
function updDays(id,v){const i=cart.find(c=>c.id===id);if(i)i.days=Math.max(1,parseInt(v)||1);renderCart();}

function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  ['home','admin'].forEach((n,i)=>{if(n===p)document.querySelectorAll('.nav-tab')[i]?.classList.add('active');});
  if(p==='home')renderGrid();
  if(p==='cart')renderCart();
  if(p==='admin')renderAdminWorkers();
}

function applyFilters(){renderGrid();}
function renderGrid(){
  const loc=document.getElementById('filterLocation')?.value.toLowerCase()||'';
  const skill=document.getElementById('filterSkill')?.value||'';
  const avail=document.getElementById('filterAvail')?.value||'';
  const level=document.getElementById('filterLevel')?.value||'';
  const f=workers.filter(w=>{
    if(loc&&!w.location.toLowerCase().includes(loc))return false;
    if(skill&&w.skill!==skill)return false;
    if(avail==='Available'&&!w.available)return false;
    if(avail==='Busy'&&w.available)return false;
    if(level&&w.level!==level)return false;
    return true;
  });
  document.getElementById('resultsCount').textContent=f.length+' result'+(f.length!==1?'s':'');
  const g=document.getElementById('workersGrid');
  if(!f.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--ink3)">No workers match your filters.</div>';return;}
  g.innerHTML=f.map(w=>{
    const inCart=cart.find(c=>c.id===w.id);
    return `<div class="wcard">
      <span class="avail-dot ${w.available?'on':'off'}">${w.available?'Available':'Busy'}</span>
      <div class="wcard-top">
        <div class="wcard-avatar" style="background:${SKILL_BG[w.skill]||'#f5f5f5'}">${em(w.skill)}</div>
        <div class="wcard-meta">
          <div class="wcard-name">${w.name}</div>
          <div class="wcard-skill">${w.skill}</div>
          <div class="wcard-loc">📍 ${w.location} · <span class="stars">${stars(w.rating)}</span> ${w.rating}</div>
        </div>
      </div>
      <div class="wcard-stats">
        <div class="wstat"><div class="wstat-val">${w.exp}y</div><div class="wstat-key">Exp</div></div>
        <div class="wstat"><div class="wstat-val">${w.level}</div><div class="wstat-key">Level</div></div>
        <div class="wstat"><div class="wstat-val">₹${w.rate}</div><div class="wstat-key">Per day</div></div>
      </div>
      <div class="wcard-foot">
        <button class="btn-add" ${(!w.available||inCart)?'disabled':''} onclick="addToCart(${w.id})">
          ${inCart?'✓ In cart':(!w.available?'Unavailable':'Add to cart')}
        </button>
        <button class="btn-ghost" onclick="viewWorker(${w.id})">View</button>
      </div>
    </div>`;
  }).join('');
}

function viewWorker(id){
  const w=workers.find(x=>x.id===id);if(!w)return;
  document.getElementById('modalTitle').textContent=w.name;
  document.getElementById('modalBody').innerHTML=`
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
      <div style="width:48px;height:48px;border-radius:9px;background:${SKILL_BG[w.skill]||'#f5f5f5'};display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0">${em(w.skill)}</div>
      <div>
        <div style="font-size:.76rem;margin-bottom:4px"><span class="stag">${w.skill}</span> &nbsp;<span class="lvl ${lvlC(w.level)}">${w.level}</span></div>
        <div style="font-size:.78rem;color:var(--ink3)">📍 ${w.location} · 📞 ${w.contact}</div>
      </div>
    </div>
    <p style="font-size:.84rem;color:var(--ink2);line-height:1.72;margin-bottom:14px">${w.about}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:2px">
      <div class="scard" style="padding:12px"><div class="scard-val" style="font-size:1.25rem">${w.exp}y</div><div class="scard-key">Experience</div></div>
      <div class="scard" style="padding:12px"><div class="scard-val" style="font-size:1.25rem">${w.rating}</div><div class="scard-key">Rating</div></div>
      <div class="scard" style="padding:12px"><div class="scard-val" style="font-size:1.25rem">₹${w.rate}</div><div class="scard-key">Per day</div></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeOverlay()">Close</button>
      ${w.available?`<button class="btn-save" onclick="addToCart(${w.id});closeOverlay()">Add to cart</button>`:'<span style="font-size:.8rem;color:var(--ink3)">Currently unavailable</span>'}
    </div>`;
  openOverlay();
}

function renderCart(){
  const el=document.getElementById('cartContent');
  if(!cart.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><h3>Cart is empty</h3><p>Browse workers and add them to get started.</p><button class="btn-sm" onclick="showPage('home')">Find workers</button></div>`;
    return;
  }
  const total=cart.reduce((s,c)=>s+c.rate*c.days,0);
  const totalDays=cart.reduce((s,c)=>s+c.days,0);
  el.innerHTML=`
  <div class="cart-head">
    <h2>Order cart</h2>
    <p>${cart.length} worker${cart.length>1?'s':''} · ${totalDays} day${totalDays>1?'s':''} total</p>
  </div>
  <div class="cart-layout">
    <div class="cart-items">
      ${cart.map(i=>`
      <div class="cart-item">
        <div class="ci-avatar" style="background:${SKILL_BG[i.skill]||'#f5f5f5'}">${em(i.skill)}</div>
        <div class="ci-info">
          <div class="ci-name">${i.name}</div>
          <div class="ci-sub">${i.skill} · ${i.level} · ₹${i.rate}/day · 📍 ${i.location}</div>
        </div>
        <div class="ci-right">
          <span class="days-label">Days</span>
          <input type="number" class="days-input" min="1" value="${i.days}" onchange="updDays(${i.id},this.value)">
          <div class="ci-price">₹${(i.rate*i.days).toLocaleString()}</div>
          <button class="btn-rm" onclick="removeFromCart(${i.id})">✕</button>
        </div>
      </div>`).join('')}
    </div>
    <div>
      <div class="order-box">
        <div class="order-box-title">Summary</div>
        ${cart.map(i=>`<div class="sum-row"><span>${i.name} × ${i.days}d</span><span>₹${(i.rate*i.days).toLocaleString()}</span></div>`).join('')}
        <div class="sum-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
        <div class="form-sep"></div>
        <div style="font-size:.7rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:13px">Your details</div>
        <label class="flabel">Full name</label><input class="finput" id="custName" placeholder="Your name">
        <label class="flabel">Phone</label><input class="finput" id="custPhone" placeholder="+91 XXXXX XXXXX">
        <label class="flabel">Address</label><input class="finput" id="custAddr" placeholder="Service address">
        <label class="flabel">Date</label><input class="finput" type="date" id="custDate">
        <label class="flabel">Notes</label><input class="finput" id="custNotes" placeholder="Optional">
        <button class="btn-order" onclick="placeOrder()">Place order →</button>
      </div>
    </div>
  </div>`;
}

function placeOrder(){
  const name=document.getElementById('custName')?.value.trim();
  const phone=document.getElementById('custPhone')?.value.trim();
  const addr=document.getElementById('custAddr')?.value.trim();
  const date=document.getElementById('custDate')?.value;
  if(!name||!phone||!addr||!date){toast('Please fill all details','err');return;}
  const o={id:nextOId++,customer:name,phone,address:addr,date,
    notes:document.getElementById('custNotes')?.value||'',
    workers:[...cart],total:cart.reduce((s,c)=>s+c.rate*c.days,0),
    status:'New',created:new Date().toLocaleString()};
  orders.push(o);cart=[];updCartCount();
  document.getElementById('cartContent').innerHTML=`
    <div class="success-screen">
      <div class="tick">✅</div>
      <h2>Order placed</h2>
      <p>Order <strong>#${o.id}</strong> received. Our team will call you at <strong>${phone}</strong> to confirm and dispatch the workers.</p>
      <p>${addr} · ${date}</p>
      <button class="btn-sm" onclick="showPage('home')">Back to workers</button>
    </div>`;
}

function adminTab(tab,el){
  document.querySelectorAll('.side-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  if(tab==='workers')renderAdminWorkers();
  if(tab==='orders')renderAdminOrders();
  if(tab==='stats')renderAdminStats();
}

function renderAdminWorkers(){
  const m=document.getElementById('adminMain');
  m.innerHTML=`
    <h2>Workers</h2>
    <p class="admin-subtitle">Manage your workforce — add, edit or remove workers.</p>
    <div class="stat-row">
      <div class="scard"><div class="scard-val">${workers.length}</div><div class="scard-key">Total workers</div></div>
      <div class="scard"><div class="scard-val">${workers.filter(w=>w.available).length}</div><div class="scard-key">Available</div></div>
      <div class="scard"><div class="scard-val">${[...new Set(workers.map(w=>w.skill))].length}</div><div class="scard-key">Trade types</div></div>
      <div class="scard"><div class="scard-val">${(workers.reduce((s,w)=>s+w.rating,0)/workers.length).toFixed(1)}</div><div class="scard-key">Avg rating</div></div>
    </div>
    <div class="table-card">
      <div class="table-head-row"><h3>All workers</h3><button class="btn-add-w" onclick="openAddForm(null)">+ Add worker</button></div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Name</th><th>Skill</th><th>Level</th><th>Location</th><th>Contact</th><th>Exp</th><th>Rating</th><th>₹/day</th><th>Status</th><th></th></tr></thead>
        <tbody>${workers.map(w=>`<tr>
          <td class="td-name">${w.name}</td>
          <td><span class="stag">${w.skill}</span></td>
          <td><span class="lvl ${lvlC(w.level)}">${w.level}</span></td>
          <td>${w.location}</td>
          <td style="color:var(--ink3);font-size:.79rem">${w.contact}</td>
          <td>${w.exp}y</td>
          <td><span class="stars" style="font-size:.72rem">★</span> ${w.rating}</td>
          <td style="font-weight:500;color:var(--ink)">₹${w.rate}</td>
          <td><span class="avail-dot ${w.available?'on':'off'}" style="position:static;display:inline-block">${w.available?'Available':'Busy'}</span></td>
          <td><div class="act">
            <button class="btn-e" onclick="openAddForm(${w.id})">Edit</button>
            <button class="btn-d" onclick="delWorker(${w.id})">Delete</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

function renderAdminOrders(){
  const m=document.getElementById('adminMain');
  m.innerHTML=`
    <h2>Orders</h2>
    <p class="admin-subtitle">Review and dispatch incoming orders.</p>
    ${!orders.length
      ?'<div class="empty"><div class="empty-icon">📭</div><h3>No orders yet</h3><p>Customer orders will appear here.</p></div>'
      :`<div class="orders-stack">${orders.map(o=>`
      <div class="ocard">
        <div class="ocard-top">
          <div><div class="oid">#${o.id}</div><div class="odate">${o.created}</div></div>
          <span class="ostatus os-${o.status.toLowerCase().replace(' ','-')}">${o.status}</span>
        </div>
        <div class="ocust">👤 <strong>${o.customer}</strong> · 📞 ${o.phone} · 📍 ${o.address}<br>📅 ${o.date} · 💰 <strong>₹${o.total.toLocaleString()}</strong></div>
        <div class="otags">${o.workers.map(w=>`<span class="stag">${em(w.skill)} ${w.name} (${w.days}d)</span>`).join('')}</div>
        ${o.notes?`<div style="font-size:.78rem;color:var(--ink3);margin-bottom:10px">📝 ${o.notes}</div>`:''}
        <div>
          ${o.status==='New'?`<button class="btn-dispatch" onclick="setOrderStatus(${o.id},'Processing')">Mark processing</button>`:''}
          ${o.status==='Processing'?`<button class="btn-dispatch" onclick="setOrderStatus(${o.id},'Dispatched')">Mark dispatched</button>`:''}
          ${o.status==='Dispatched'?`<span style="font-size:.8rem;color:var(--green);font-weight:500">✓ Dispatched</span>`:''}
        </div>
      </div>`).join('')}</div>`}`;
}

function renderAdminStats(){
  const m=document.getElementById('adminMain');
  const sc={};workers.forEach(w=>{sc[w.skill]=(sc[w.skill]||0)+1;});
  const rev=orders.reduce((s,o)=>s+o.total,0);
  m.innerHTML=`
    <h2>Overview</h2>
    <p class="admin-subtitle">Platform at a glance.</p>
    <div class="stat-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="scard"><div class="scard-val">${workers.length}</div><div class="scard-key">Total workers</div></div>
      <div class="scard"><div class="scard-val">${orders.length}</div><div class="scard-key">Total orders</div></div>
      <div class="scard"><div class="scard-val">₹${rev.toLocaleString()}</div><div class="scard-key">Total revenue</div></div>
    </div>
    <div class="table-card" style="padding:20px">
      <div style="font-size:.7rem;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px">Workers by trade</div>
      ${Object.entries(sc).map(([s,n])=>`
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:9px">
          <div style="width:118px;font-size:.81rem;color:var(--ink2)">${em(s)} ${s}</div>
          <div style="flex:1;background:var(--off);border-radius:3px;height:5px;overflow:hidden">
            <div style="width:${(n/workers.length*100).toFixed(0)}%;background:var(--ink);height:100%;border-radius:3px"></div>
          </div>
          <div style="font-size:.82rem;font-weight:600;color:var(--ink);width:18px;text-align:right">${n}</div>
        </div>`).join('')}
    </div>`;
}

function setOrderStatus(id,s){
  const o=orders.find(x=>x.id===id);if(o)o.status=s;
  renderAdminOrders();toast('Order #'+id+' → '+s);
}
function delWorker(id){
  if(!confirm('Delete this worker?'))return;
  workers=workers.filter(w=>w.id!==id);renderAdminWorkers();toast('Worker removed');
}

const SKILLS_LIST=['Electrician','Plumber','Tile Mason','Brick Mason','Cement Mason','Carpenter','Painter','Welder'];
const LEVELS_LIST=['Junior','Senior','Expert'];

function openAddForm(id){
  const w=id?workers.find(x=>x.id===id):null;
  const isEdit=!!w;
  window._availVal=w?.available!==false?1:0;
  const m=document.getElementById('adminMain');
  m.innerHTML=`
  <div class="form-page">
    <button class="form-back" onclick="renderAdminWorkers()">← Back to workers</button>
    <h2>${isEdit?'Edit worker':'Add new worker'}</h2>
    <p class="admin-subtitle">${isEdit?'Editing '+w.name:'Register a new worker below.'}</p>
    <div class="form-grid">
      <div>
        <div class="fcard">
          <div class="fcard-head">Personal info</div>
          <div class="fcard-body">
            <div class="fg"><label>Full name <span class="req">*</span></label><input class="fi" id="wName" value="${w?.name||''}" placeholder="e.g. John Doe"></div>
            <div class="fg"><label>Contact number <span class="req">*</span></label><input class="fi" id="wContact" value="${w?.contact||''}" placeholder="10-digit mobile" maxlength="10"></div>
            <div class="fg"><label>Location / City <span class="req">*</span></label><input class="fi" id="wLocation" value="${w?.location||''}" placeholder="e.g. Kohima"></div>
            <div class="fg"><label>About / Bio</label><textarea class="fi" id="wAbout" placeholder="Brief description…">${w?.about||''}</textarea></div>
          </div>
        </div>
        <div class="fcard">
          <div class="fcard-head">Availability</div>
          <div class="fcard-body">
            <div class="avail-row">
              <div class="avail-opt avail-yes ${w?.available!==false?'sel':''}" onclick="setAvail(1)">
                <div class="ao-icon">✅</div><div class="ao-label">Available</div>
              </div>
              <div class="avail-opt avail-no ${w?.available===false?'sel':''}" onclick="setAvail(0)">
                <div class="ao-icon">🔴</div><div class="ao-label">Busy</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="fcard">
          <div class="fcard-head">Skill & experience</div>
          <div class="fcard-body">
            <div class="fg">
              <label>Trade / Skill <span class="req">*</span></label>
              <div class="skill-grid" id="skillGrid">
                ${SKILLS_LIST.map(s=>{
                  const sel=w?.skill===s||(!w&&s===SKILLS_LIST[0]);
                  return `<div class="skill-opt${sel?' sel':''}" id="sk-${s.replace(/ /g,'-')}" onclick="selSkill('${s}')">${em(s)} ${s}</div>`;
                }).join('')}
              </div>
              <input type="hidden" id="wSkill" value="${w?.skill||SKILLS_LIST[0]}">
            </div>
            <div class="fg">
              <label>Level</label>
              <div class="level-row">
                ${LEVELS_LIST.map(l=>{
                  const sel=w?.level===l||(!w&&l==='Junior');
                  const ic=l==='Expert'?'🏆':l==='Senior'?'⭐':'🌱';
                  return `<div class="level-opt${sel?' sel':''}" id="lv-${l}" onclick="selLevel('${l}')"><div class="lo-icon">${ic}</div><div class="lo-label">${l}</div></div>`;
                }).join('')}
              </div>
              <input type="hidden" id="wLevel" value="${w?.level||'Junior'}">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
              <div class="fg"><label>Experience (yrs)</label><input class="fi" id="wExp" type="number" min="0" max="50" value="${w?.exp??0}"></div>
              <div class="fg"><label>Rating (1–5)</label><input class="fi" id="wRating" type="number" step=".1" min="1" max="5" value="${w?.rating??4.0}"></div>
            </div>
            <div class="fg">
              <label>Daily rate (₹)</label>
              <div class="rate-wrap"><span class="rate-pre">₹</span><input class="fi" id="wRate" type="number" min="0" value="${w?.rate??500}"></div>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-form-cancel" onclick="renderAdminWorkers()">Cancel</button>
          <button class="btn-form-save" onclick="${isEdit?`saveEdit(${w.id})`:'saveNew()'}">${isEdit?'Save changes':'Add worker'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function selSkill(s){
  document.getElementById('wSkill').value=s;
  document.querySelectorAll('.skill-opt').forEach(el=>el.classList.toggle('sel',el.id==='sk-'+s.replace(/ /g,'-')));
}
function selLevel(l){
  document.getElementById('wLevel').value=l;
  document.querySelectorAll('.level-opt').forEach(el=>el.classList.toggle('sel',el.id==='lv-'+l));
}
function setAvail(v){
  window._availVal=v;
  document.querySelectorAll('.avail-opt').forEach(el=>{
    const isYes=el.classList.contains('avail-yes');
    el.classList.toggle('sel',v===1?isYes:!isYes);
  });
}
function collectForm(){
  const name=document.getElementById('wName')?.value.trim();
  const contact=document.getElementById('wContact')?.value.trim();
  const location=document.getElementById('wLocation')?.value.trim();
  if(!name||!contact||!location){toast('Please fill required fields','err');return null;}
  return{
    name,contact,location,
    skill:document.getElementById('wSkill')?.value||'Electrician',
    level:document.getElementById('wLevel')?.value||'Junior',
    exp:parseInt(document.getElementById('wExp')?.value)||0,
    rating:Math.min(5,Math.max(1,parseFloat(document.getElementById('wRating')?.value)||4.0)),
    rate:parseInt(document.getElementById('wRate')?.value)||500,
    about:document.getElementById('wAbout')?.value||'',
    available:(window._availVal??1)===1,
  };
}
function saveNew(){const w=collectForm();if(!w)return;w.id=nextWId++;workers.push(w);renderAdminWorkers();toast('Worker added ✓');}
function saveEdit(id){const u=collectForm();if(!u)return;const i=workers.findIndex(x=>x.id===id);if(i>=0)workers[i]={...workers[i],...u};renderAdminWorkers();toast('Worker updated ✓');}

function openOverlay(){document.getElementById('overlay').classList.add('open');}
function closeOverlay(){document.getElementById('overlay').classList.remove('open');}
function closeOverlayOutside(e){if(e.target===document.getElementById('overlay'))closeOverlay();}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderGrid();
</script>
</body>
</html>
