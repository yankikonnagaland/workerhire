<!DOCTYPE html>
<html>
<head>
  <title>Hire Workers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

  <!-- HEADER -->
  <div class="bg-white p-6 rounded-2xl shadow mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">Hire Workers</h1>
      <p class="text-gray-500 text-sm">Find electricians, plumbers and more</p>
    </div>
    <div class="bg-gray-100 px-4 py-2 rounded-xl">
      Cart: ₹<span id="total">0</span>
    </div>
  </div>

  <!-- FILTER -->
  <div class="bg-white p-4 rounded-2xl shadow mb-6 flex gap-4">
    <select id="locationFilter" class="border p-2 rounded-lg" onchange="filterWorkers()">
      <option value="all">All Locations</option>
      <option>Dimapur</option>
      <option>Kohima</option>
      <option>Mokokchung</option>
    </select>

    <select id="skillFilter" class="border p-2 rounded-lg" onchange="filterWorkers()">
      <option value="all">All Skills</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Tile Mason</option>
      <option>Mason</option>
    </select>
  </div>

  <div class="grid grid-cols-3 gap-6">

    <!-- WORKERS -->
    <div class="col-span-2 space-y-4" id="workers"></div>

    <!-- CART -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <h2 class="font-bold mb-3">Cart</h2>
      <div id="cart"></div>

      <div class="mt-4 font-bold">
        Total: ₹<span id="total2">0</span>
      </div>

      <!-- CHECKOUT -->
      <div class="mt-4 border-t pt-4">
        <input id="name" placeholder="Name" class="w-full border p-2 rounded mb-2">
        <input id="phone" placeholder="Phone" class="w-full border p-2 rounded mb-2">
        <textarea id="address" placeholder="Address" class="w-full border p-2 rounded mb-2"></textarea>

        <button onclick="placeOrder()" class="w-full bg-black text-white p-2 rounded-lg">
          Place Order
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const workers = [
  {id:1,name:"Alem",location:"Dimapur",skill:"Electrician",price:1200},
  {id:2,name:"Imkong",location:"Kohima",skill:"Plumber",price:1000},
  {id:3,name:"Senti",location:"Dimapur",skill:"Tile Mason",price:1500},
  {id:4,name:"Walling",location:"Mokokchung",skill:"Mason",price:1600}
];

let cart = [];

function renderWorkers(list){
  const container = document.getElementById("workers");
  container.innerHTML = "";

  list.forEach(w => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
        <div>
          <div class="font-bold text-lg">${w.name}</div>
          <div class="text-gray-500 text-sm">${w.skill} • ${w.location}</div>
        </div>
        <div class="text-right">
          <div class="font-bold">₹${w.price}</div>
          <button onclick="addToCart(${w.id})" class="mt-2 bg-black text-white px-3 py-1 rounded">
            Add
          </button>
        </div>
      </div>
    `;
  });
}

function addToCart(id){
  const worker = workers.find(w => w.id === id);
  if(cart.find(i => i.id === id)) return;
  cart.push(worker);
  renderCart();
}

function renderCart(){
  const container = document.getElementById("cart");
  let total = 0;
  container.innerHTML = "";

  cart.forEach((item,i)=>{
    total += item.price;
    container.innerHTML += `
      <div class="flex justify-between mb-2">
        <span>${item.name}</span>
        <button onclick="removeItem(${i})" class="text-red-500">x</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("total2").innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function filterWorkers(){
  const loc = document.getElementById("locationFilter").value;
  const skill = document.getElementById("skillFilter").value;

  let filtered = workers;

  if(loc !== "all") filtered = filtered.filter(w=>w.location===loc);
  if(skill !== "all") filtered = filtered.filter(w=>w.skill===skill);

  renderWorkers(filtered);
}

function placeOrder(){
  if(cart.length===0){
    alert("Add workers first");
    return;
  }
  alert("Order placed. Manager will contact you.");
  cart = [];
  renderCart();
}

renderWorkers(workers);
</script>

</body>
</html>
